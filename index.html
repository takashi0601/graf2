<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>被害集計グラフ</title>

<!-- ArcGIS（先に読み込む） -->
<script src="https://js.arcgis.com/4.29/"></script>

<style>
body {
  font-family: sans-serif;
  margin: 20px;
}

.summary {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.card {
  flex: 1;
  color: white;
  padding: 10px;
  border-radius: 6px;
  text-align: center;
  font-weight: bold;
}

.zennkai { background:#8B0000; }
.hankai { background:#FF1744; }
.ichibu { background:#FF9800; }
.yukau { background:#9E9E9E; }
.yukashita { background:#616161; }

canvas {
  max-width: 100%;
}
</style>
</head>

<body>

<h2>住家被害情報</h2>

<!-- サマリー -->
<div class="summary">
  <div class="card zennkai">全壊<br><span id="全壊">0</span>件</div>
  <div class="card hankai">半壊<br><span id="半壊">0</span>件</div>
  <div class="card ichibu">一部損壊<br><span id="一部損壊">0</span>件</div>
  <div class="card yukau">床上浸水<br><span id="床上浸水">0</span>件</div>
  <div class="card yukashita">床下浸水<br><span id="床下浸水">0</span>件</div>
</div>

<canvas id="myChart"></canvas>

<script>
require(["esri/layers/FeatureLayer"], function (FeatureLayer) {

  // ★ Chart.jsを後から読み込む（競合回避）
  const script = document.createElement("script");
  script.src = "https://cdn.jsdelivr.net/npm/chart.js";

  script.onload = function () {

    const layer = new FeatureLayer({
      url: "https://services9.arcgis.com/YtkgVT3n52Tm7z1d/arcgis/rest/services/moc_adminarea_dissolve_gdb/FeatureServer/0"
    });

    const query = layer.createQuery();
    query.outFields = ["*"];
    query.returnGeometry = false;

  layer.queryFeatures(query).then(function (result) {

  const features = result.features;

  console.log(features[0].attributes); // ←確認用

  // =====================
  // X軸（区市町村）
  // =====================
  const labels = features.map(f =>
    f.attributes["FIRST_N03_004"]
  );

  // =====================
  // データセット
  // =====================
  const datasets = [
    {
      label: "全壊",
      data: features.map(f => f.attributes["zenkai"] || 0),
      backgroundColor: "#8B0000"
    },
    {
      label: "半壊",
      data: features.map(f => f.attributes["hankai"] || 0),
      backgroundColor: "#FF1744"
    },
    {
      label: "一部損壊",
      data: features.map(f => f.attributes["ichibu_sonkai"] || 0),
      backgroundColor: "#FF9800"
    },
    {
      label: "床上浸水",
      data: features.map(f => f.attributes["shinsui"] || 0),
      backgroundColor: "#9E9E9E"
    },
    {
      label: "床下浸水",
      data: features.map(f => f.attributes["床下浸水"] || 0),
      backgroundColor: "#616161"
    }
  ];

  // =====================
  // サマリー
  // =====================
  const summary = {
    "全壊": 0,
    "半壊": 0,
    "一部損壊": 0,
    "床上浸水": 0,
    "床下浸水": 0
  };

  features.forEach(f => {
    summary["全壊"] += f.attributes["zenkai"] || 0;
    summary["半壊"] += f.attributes["hankai"] || 0;
    summary["一部損壊"] += f.attributes["ichibu_sonkai"] || 0;
    summary["床上浸水"] += f.attributes["shinsui"] || 0;
    summary["床下浸水"] += f.attributes["床下浸水"] || 0;
  });

  Object.keys(summary).forEach(k => {
    document.getElementById(k).innerText = summary[k];
  });

  // =====================
  // グラフ
  // =====================
  const ctx = document.getElementById("myChart").getContext("2d");

  new window.Chart(ctx, {
    type: "bar",
    data: {
      labels: labels,
      datasets: datasets
    },
    options: {
      scales: {
        x: { stacked: true },
        y: { stacked: true, beginAtZero: true }
      }
    }
  });

});

  };

  document.body.appendChild(script);

});
</script>

</body>
</html>
