<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

  <!-- ArcGIS Maps SDK for JavaScript -->
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    body { font-family: Arial; }
    .container { display: flex; flex-wrap: wrap; align-items: center; gap: 30px; }
    canvas { width: 1000px !important; height: 300px !important; }
    table { border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px 12px; }
    #legendBox { font-size: 18px; }
    .legend-item { margin-bottom: 10px; }
    .legend-color { display: inline-block;  width: 14px;  height: 14px;  margin-right: 8px; }
  </style>
  
</head>

<body>
  <div class="container">
    <canvas id="barChart" ></canvas> <!-- 棒グラフ -->
  </div>    

<script>
require(["esri/layers/FeatureLayer"], function(FeatureLayer) {

  // レイヤー or テーブル
  const layer = new FeatureLayer({
    url: "https://services9.arcgis.com/YtkgVT3n52Tm7z1d/arcgis/rest/services/moc_adminarea_dissolve_gdb/FeatureServer/0"
  });

  let charts = [];

  layer.queryFeatures({
    where: "FIRST_N03_004 IN ('港区','新宿区','杉並区','世田谷区','千代田区','足立区','大田区','品川区','豊島区')",
    outFields: ["*"],
    returnGeometry: false
  }).then(res => {

  const labels = [];
  const 全壊配列 = [];
  const 半壊配列 = [];
  const 一部損壊配列 = [];
  const 床上浸水配列 = [];
  const 床下浸水配列 = [];

  res.features.forEach((f, index) => {

    const 全壊 = Number(f.attributes["zenkai"]) || 0;
    const 半壊 = Number(f.attributes["hankai"]) || 0;
    const 一部損壊 = Number(f.attributes["ichibu_sonkai"]) || 0;
    const 床上浸水 = Number(f.attributes["shinsui"]) || 0;
    const 床下浸水 = Number(f.attributes["床下浸水"]) || 0;

    labels.push(f.attributes["FIRST_N03_004"]);

    全壊配列.push(全壊);
    半壊配列.push(半壊);
    一部損壊配列.push(一部損壊);
    床上浸水配列.push(床上浸水);
    床下浸水配列.push(床下浸水);
  });

  // ===== 棒グラフ =====
  new Chart(document.getElementById('barChart'), {
  type: 'bar',
  data: {
    labels: labels,
    datasets: [
      {
        label: "全壊",
        data: 全壊配列,
        backgroundColor: "#b22222",
      },
      {
        label: "半壊",
        data: 半壊配列,
        backgroundColor: "#dc143c",
      },
      {
        label: "一部損壊",
        data: 一部損壊配列,
        backgroundColor: "#ff9800",
      },
      {
        label: "床上浸水",
        data: 床上浸水配列,
        backgroundColor: "#767676",
      },
      {
        label: "床下浸水",
        data: 床下浸水配列,
        backgroundColor: "#767676",
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        labels: {
          font: { size: 24 }
        }
      }
    },
    datalabels: {
        // display: false,
        color: "#fff",
        font: {
          size: 22,
          weight: "bold"
        },
      scales: {
        x: {
          stacked: true,
          ticks: {
            font: {
              size: 24
            }
          }
        },
        y: {
          stacked: true,
          beginAtZero: true,
          ticks: {
            font: {
              size: 24
            }
          }
        }
      }
  }
});

    function createChart(id, type, labels, values) {
      const el = document.getElementById(id);

      new Chart(el, {
        type: type,
        data: {
          labels: labels,
          datasets: [{
            data: values
          }]
        }
      });
    }
  });
});
</script>

</body>
</html>
