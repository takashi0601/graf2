<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>積み上げグラフ</title>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <h2>被害状況（積み上げ）</h2>
  <canvas id="myChart"></canvas>

  <script>
    // ★ ArcGIS Online レイヤーURL
    const url = "https://services9.arcgis.com/YtkgVT3n52Tm7z1d/arcgis/rest/services/moc_adminarea_dissolve_gdb/FeatureServer/0";

    const params = {
      where: "1=1",
      outFields: "city_name, zenkai, hankai",
      returnGeometry: false,
      f: "json"
    };

    fetch(url + "?" + new URLSearchParams(params))
      .then(res => res.json())
      .then(data => {

        const features = data.features;

        // データ整形
        const labels = features.map(f => f.attributes.FIRST_N03_004);
        const zenkai = features.map(f => f.attributes.zenkai || 0);
        const hankai = features.map(f => f.attributes.hankai || 0);

        drawChart(labels, zenkai, hankai);
      })
      .catch(err => {
        console.error("データ取得エラー:", err);
      });

    function drawChart(labels, zenkai, hankai) {
      const ctx = document.getElementById("myChart");

      new Chart(ctx, {
        type: "bar",
        data: {
          labels: labels,
          datasets: [
            {
              label: "全壊",
              data: zenkai,
              backgroundColor: "rgba(255, 99, 132, 0.7)"
            },
            {
              label: "半壊",
              data: hankai,
              backgroundColor: "rgba(54, 162, 235, 0.7)"
            }
          ]
        },
        options: {
          responsive: true,
          scales: {
            x: {
              stacked: true
            },
            y: {
              stacked: true,
              beginAtZero: true
            }
          }
        }
      });
    }
  </script>

</body>
</html>
