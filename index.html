<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

  <!-- ArcGIS Maps SDK for JavaScript -->
  <script src="https://js.arcgis.com/4.29/"></script>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <style>
    body { font-family: Arial; }
    .container { display: flex; flex-wrap: wrap; align-items: center; gap: 30px; }
    canvas { height: 300px !important; }
    table { border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #ccc; padding: 8px 12px; }
    #legendBox { font-size: 18px; }
    .legend-item { margin-bottom: 10px; }
    .legend-color { display: inline-block;  width: 14px;  height: 14px;  margin-right: 8px; }
    .summary { display: flex; gap: 10px; margin-bottom: 20px; }
    .card { flex: 1; color: white; padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; }
    .zennkai { background:#8B0000; }
    .hankai { background:#FF1744; }
    .ichibu { background:#FF9800; }
    .yukau { background:#9E9E9E; }
    .yukashita { background:#616161; }
    .icon-white { font-size: 32px; font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48; color: white; }
  </style>
  
</head>

<body>
  <div class="summary">
    <div class="card zennkai">全壊<br><img　src='other_houses_24dp_1F1F1F_FILL0_wght400_GRAD0_opsz24.png'><span id="全壊">0</span>件</div>
    <div class="card hankai">半壊<br><span class="material-symbols-outlined">Other_Houses</span><span id="半壊">0</span>件</div>
    <div class="card ichibu">一部破損<br><span class="material-symbols-outlined">Other_Houses</span><span id="一部破損">0</span>件</div>
    <div class="card yukau">床上浸水<br><span class="material-symbols-outlined icon-white">Houseboat</span><span id="床上浸水">0</span>件</div>
    <div class="card yukashita">床下浸水<br><span class="material-symbols-outlined">Houseboat</span><span id="床下浸水">0</span>件</div>
  </div>
  <div class="container">
    <canvas id="barChart" ></canvas> <!-- 棒グラフ -->
  </div>    

<script>
Chart.register(ChartDataLabels);
require(["esri/layers/FeatureLayer"], function(FeatureLayer) {

  const layer = new FeatureLayer({
    url: "https://services9.arcgis.com/YtkgVT3n52Tm7z1d/arcgis/rest/services/moc_adminarea_dissolve_gdb/FeatureServer/0"
  });

  layer.queryFeatures({
    where: "FIRST_N03_004 IN ('港区','新宿区','杉並区','世田谷区','千代田区','足立区','大田区','品川区','豊島区')",
    outFields: ["*"],
    returnGeometry: false
  }).then(res => {

    const order = [
      "港区",
      "新宿区",
      "杉並区",
      "世田谷区",
      "千代田区",
      "足立区",
      "大田区",
      "品川区",
      "豊島区"
    ];

    res.features.sort((a, b) => {
      const nameA = a.attributes["FIRST_N03_004"];
      const nameB = b.attributes["FIRST_N03_004"];
      return order.indexOf(nameA) - order.indexOf(nameB);
    });

    const labels = [];
    const 全壊配列 = [];
    const 半壊配列 = [];
    const 一部損壊配列 = [];
    const 床上浸水配列 = [];
    const 床下浸水配列 = [];

    // ★ 合計用
    let sum全壊 = 0;
    let sum半壊 = 0;
    let sum一部 = 0;
    let sum床上 = 0;
    let sum床下 = 0;

    res.features.forEach(f => {

      const 全壊 = Number(f.attributes["zenkai"]) || 0;
      const 半壊 = Number(f.attributes["hankai"]) || 0;
      const 一部損壊 = Number(f.attributes["ichibu_sonkai"]) || 0;
      const 床上浸水 = Number(f.attributes["shinsui"]) || 0;
      const 床下浸水 = Number(f.attributes["床下浸水"]) || 0;

      // 配列
      labels.push(f.attributes["FIRST_N03_004"]);
      全壊配列.push(全壊);
      半壊配列.push(半壊);
      一部損壊配列.push(一部損壊);
      床上浸水配列.push(床上浸水);
      床下浸水配列.push(床下浸水);

      // ★ 合計
      sum全壊 += 全壊;
      sum半壊 += 半壊;
      sum一部 += 一部損壊;
      sum床上 += 床上浸水;
      sum床下 += 床下浸水;
    });

    // ★ カードに反映
    document.getElementById("全壊").textContent = sum全壊;
    document.getElementById("半壊").textContent = sum半壊;
    document.getElementById("一部破損").textContent = sum一部;
    document.getElementById("床上浸水").textContent = sum床上;
    document.getElementById("床下浸水").textContent = sum床下;

    // ===== 棒グラフ =====
    new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          {
            label: "一部損壊",
            data: 一部損壊配列,
            backgroundColor: "#ff9800",
          },
          {
            label: "半壊",
            data: 半壊配列,
            backgroundColor: "#dc143c",
          },
          {
            label: "全壊",
            data: 全壊配列,
            backgroundColor: "#b22222",
          },
          {
            label: "床上浸水",
            data: 床上浸水配列,
            backgroundColor: "#9E9E9E",
          },
          {
            label: "床下浸水",
            data: 床下浸水配列,
            backgroundColor: "#616161",
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            labels: {
              font: { size: 24 }
            }
          },
          datalabels: {
            color: "#fff",
            formatter: function(value) {
              return value === 0 ? "" : value;
            },
            font: {
              size: 22,
              weight: "bold"
            }
          }
        },
        scales: {
          x: {
            stacked: true,
            ticks: {
              font: { size: 24 }
            }
          },
          y: {
            stacked: true,
            beginAtZero: true,
            ticks: {
              font: { size: 24 }
            }
          }
        }
      }
    });
  });
});
</script>

</body>
</html>
